<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Underline Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            padding: 40px 0;
        }

        .item {
            position: relative;
            color: #e0e0e0;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-decoration: none;
            cursor: pointer;
            padding-bottom: 6px;
        }

        .item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #e94560;
            transform: scaleX(0);
            transform-origin: left center;
            animation: none;
        }

        .item:hover::after {
            animation: underline-in 0.35s ease forwards;
        }

        @keyframes underline-in {
            from {
                transform: scaleX(0);
            }
            to {
                transform: scaleX(1);
            }
        }
    </style>
</head>
<body>
    <nav class="container">
        <a href="#" class="item">Home</a>
        <a href="#" class="item">Development</a>
        <a href="#" class="item">Videography</a>
        <a href="#" class="item">Drone Hire</a>
        <a href="#" class="item">Consulting</a>
    </nav>
</body>
</html>
